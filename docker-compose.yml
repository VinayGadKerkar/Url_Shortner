version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# URL Shortener — full stack (Zookeeper-free, KRaft-mode Kafka)
#
# Usage:
#   docker compose up -d               # start everything
#   docker compose logs -f app         # tail backend logs
#   docker compose logs -f frontend    # tail frontend logs
#   docker compose down                # stop and remove containers
#   docker compose down -v             # full reset — also wipes volumes
#   docker compose up -d --build       # rebuild all images after code changes
#   docker compose up -d --build app   # rebuild only the Go API
#   docker compose up -d --build frontend  # rebuild only the frontend
#
# Once running:
#   Frontend  → http://localhost:3000
#   Backend   → http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft mode — no Zookeeper required) ───────────────────────────────
  # apache/kafka is the official Docker image from the Apache Kafka project.
  # It runs in KRaft mode by default (combined broker+controller in one node).
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft: this single node is both broker and controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Listeners:
      #   PLAINTEXT      → used by other Docker containers (internal)
      #   PLAINTEXT_HOST → used by host-machine clients on port 9092
      #   CONTROLLER     → KRaft controller communication (internal only)
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-urlshortener}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-urlshortener}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Go API ───────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urlshortener_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    env_file:
      - ./backend/.env
    environment:
      # Override hosts to use Docker service names, not localhost.
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      KAFKA_BROKER: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - backend

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  # Serves the built React SPA and proxies /api, /health, and /{shortCode}
  # requests upstream to the Go API container.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urlshortener_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
