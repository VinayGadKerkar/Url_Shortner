server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static assets — long cache (Vite hashes filenames) ───────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Backend health check ──────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 5s;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    # Try to serve a static file first. If not found, try the React SPA
    # (index.html). If the path looks like a short code the React app will
    # show a "not found" page — but short-code redirects are handled by
    # the backend directly via the Go container on port 8080.
    #
    # To make short-code redirects work through the frontend port (3000),
    # we pass unknown single-segment paths to the backend before falling
    # back to the SPA.
    location / {
        # First try to serve the file locally (favicon, index.html, etc.)
        try_files $uri $uri/ @backend;
    }

    location @backend {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        # If the backend returns 404, fall back to the React SPA
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
